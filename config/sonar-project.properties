# SonarQube 프로젝트 설정
sonar.projectKey=dallo-devsecops
sonar.projectName=Dallo DevSecOps
sonar.projectVersion=1.0

# 소스 코드 경로
sonar.sources=.
sonar.exclusions=**/test_targets/**,**/tests/**,**/venv/**,**/__pycache__/**

# Python 관련 설정
sonar.language=py
sonar.python.version=3.11

# Bandit 리포트 연동 (SonarQube에서 Bandit 결과를 가져옴)
sonar.python.bandit.reportPaths=reports/bandit_report.json

# 인코딩
sonar.sourceEncoding=UTF-8
